name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: certifiedtboy/adesnotesserver
  IMAGE_TAG: v3.0.2
  CONTAINER_APP_NAME: adesnotesserver
  RESOURCE_GROUP: adesnotes

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:$IMAGE_TAG \
            .

      - name: Push Image
        run: |
          docker push $IMAGE_NAME:latest
          docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --image $IMAGE_NAME:$IMAGE_TAG

      - name: Update Azure Container App
        run: |
          az containerapp update \
            --name adesnotesserver \
            --resource-group adesnotes \
            --image certifiedtboy/adesnotesserver:v3.0.2 \
            --set-env-vars \
              ACCESS_TOKEN_EXPIRES_IN="${{ secrets.ACCESS_TOKEN_EXPIRES_IN }}" \
              ACCESS_TOKEN_SECRET="${{ secrets.ACCESS_TOKEN_SECRET }}" \
              AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              AWS_BUCKET_NAME="${{ secrets.AWS_BUCKET_NAME }}" \
              AWS_BUCKET_REGION="${{ secrets.AWS_BUCKET_REGION }}" \
              AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              EMAIL_FROM="${{ secrets.EMAIL_FROM }}" \
              MONGO_URL="${{ secrets.MONGO_URL }}" \
              OAUTH_CLIENT_ID="${{ secrets.OAUTH_CLIENT_ID }}" \
              OAUTH_CLIENT_SECRET="${{ secrets.OAUTH_CLIENT_SECRET }}" \
              REFRESH_TOKEN_EXPIRES_IN="${{ secrets.REFRESH_TOKEN_EXPIRES_IN }}" \
              REFRESH_TOKEN_SECRET="${{ secrets.REFRESH_TOKEN_SECRET }}"
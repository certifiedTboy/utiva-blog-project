name: Build and Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: certifiedtboy/adesnotesserver
  IMAGE_TAG: latest
  CONTAINER_APP_NAME: adesnotesserver
  RESOURCE_GROUP: adesnotes

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            --pull \
            -f ./server/Dockerfile \
            -t $IMAGE_NAME:$IMAGE_TAG \
            ./server

      - name: Push Docker Image
        run: |
          docker push $IMAGE_NAME:$IMAGE_TAG

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        shell: bash
        run: |
          set -e

          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$IMAGE_NAME:$IMAGE_TAG" \
            --set-env-vars \
              ACCESS_TOKEN_EXPIRES_IN="${{ secrets.ACCESS_TOKEN_EXPIRES_IN }}" \
              ACCESS_TOKEN_SECRET="${{ secrets.ACCESS_TOKEN_SECRET }}" \
              AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              AWS_BUCKET_NAME="${{ secrets.AWS_BUCKET_NAME }}" \
              AWS_BUCKET_REGION="${{ secrets.AWS_BUCKET_REGION }}" \
              AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              EMAIL_FROM="${{ secrets.EMAIL_FROM }}" \
              MONGO_URL="${{ secrets.MONGO_URL }}" \
              OAUTH_CLIENT_ID="${{ secrets.OAUTH_CLIENT_ID }}" \
              OAUTH_CLIENT_SECRET="${{ secrets.OAUTH_CLIENT_SECRET }}" \
              REFRESH_TOKEN_EXPIRES_IN="${{ secrets.REFRESH_TOKEN_EXPIRES_IN }}" \
              REFRESH_TOKEN_SECRET="${{ secrets.REFRESH_TOKEN_SECRET }}"